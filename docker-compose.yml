services:
  postgres:
    image: postgres:16
    container_name: nextjs-cursor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nextjs_cursor_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: 